name: Rag-Wiki CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  JAVA_IMAGE_PREFIX: rag-wiki-java
  PYTHON_IMAGE_PREFIX: rag-wiki-python
  FRONTEND_IMAGE_PREFIX: rag-wiki-frontend

jobs:
  # ==================== 代码质量检查 ====================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          
      - name: Java Code Quality (Checkstyle + SpotBugs)
        run: |
          cd rag-wiki-java
          mvn verify -Pquality -DskipTests
          
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Python Lint
        run: |
          cd rag-wiki-python
          pip install ruff
          ruff check app/

      - name: Frontend Lint
        run: |
          cd rag-wiki-frontend
          npm ci
          npm run lint

  # ==================== Java构建与测试 ====================
  java-build:
    name: Java Build & Test
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          
      - name: Build & Test
        run: |
          cd rag-wiki-java
          mvn clean verify -B
          
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results
          path: rag-wiki-java/**/target/surefire-reports/
          
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-coverage
          path: rag-wiki-java/**/target/site/jacoco/

  # ==================== Python构建与测试 ====================
  python-build:
    name: Python Build & Test
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          cd rag-wiki-python
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx
          
      - name: Run Tests
        run: |
          cd rag-wiki-python
          pytest tests/ -v --cov=app --cov-report=xml
          
      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: rag-wiki-python/coverage.xml

  # ==================== Docker镜像构建 ====================
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [java-build, python-build]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: gateway
            dockerfile: rag-wiki-java/rag-wiki-gateway/Dockerfile
            context: rag-wiki-java
          - name: auth
            dockerfile: rag-wiki-java/rag-wiki-auth/Dockerfile
            context: rag-wiki-java
          - name: document
            dockerfile: rag-wiki-java/rag-wiki-document/Dockerfile
            context: rag-wiki-java
          - name: python-ai
            dockerfile: rag-wiki-python/Dockerfile
            context: rag-wiki-python
          - name: frontend
            dockerfile: rag-wiki-frontend/Dockerfile
            context: rag-wiki-frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 部署到预发环境 ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Staging K8s
        uses: steebchen/kubectl@v2.1.1
        with:
          config: ${{ secrets.KUBE_CONFIG_STAGING }}
          command: apply -k rag-wiki-deploy/k8s/overlays/staging
          
      - name: Verify Deployment
        uses: steebchen/kubectl@v2.1.1
        with:
          config: ${{ secrets.KUBE_CONFIG_STAGING }}
          command: rollout status deployment -n rag-wiki-staging --timeout=300s

  # ==================== 部署到生产环境 ====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Production K8s
        uses: steebchen/kubectl@v2.1.1
        with:
          config: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
          command: apply -k rag-wiki-deploy/k8s/overlays/production
          
      - name: Verify Deployment
        uses: steebchen/kubectl@v2.1.1
        with:
          config: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
          command: rollout status deployment -n rag-wiki-prod --timeout=600s
          
      - name: Smoke Test
        run: |
          sleep 30
          curl -f https://wiki.example.com/api/actuator/health || exit 1
