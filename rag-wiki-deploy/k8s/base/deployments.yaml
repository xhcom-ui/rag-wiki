---
# Python AI Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-wiki-python
  namespace: rag-wiki
  labels:
    app: rag-wiki-python
    tier: ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-wiki-python
  template:
    metadata:
      labels:
        app: rag-wiki-python
        tier: ai
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: python-ai
          image: rag-wiki/python-ai:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ENVIRONMENT
              value: "production"
          envFrom:
            - secretRef:
                name: rag-wiki-secrets
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "4000m"
              nvidia.com/gpu: "0"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

---
# Python AI Service
apiVersion: v1
kind: Service
metadata:
  name: rag-wiki-python
  namespace: rag-wiki
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: rag-wiki-python

