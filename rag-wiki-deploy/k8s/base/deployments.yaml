# Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-wiki-gateway
  namespace: rag-wiki
  labels:
    app: rag-wiki-gateway
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-wiki-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rag-wiki-gateway
        tier: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: rag-wiki-gateway
                topologyKey: kubernetes.io/hostname
      containers:
        - name: gateway
          image: rag-wiki/gateway:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_CLOUD_NACOS_SERVER_ADDR
              valueFrom:
                configMapKeyRef:
                  name: rag-wiki-config
                  key: nacos.server-addr
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: rag-wiki-config
                  key: mysql.host
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: rag-wiki-config
                  key: redis.host
          envFrom:
            - secretRef:
                name: rag-wiki-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: rag-wiki-gateway-config

---
# Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: rag-wiki-gateway
  namespace: rag-wiki
  labels:
    app: rag-wiki-gateway
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: rag-wiki-gateway

