# Prometheus配置 - Rag-Wiki监控体系
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# 告警规则文件
rule_files:
  - 'alert_rules.yml'

# 告警通知
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# 采集目标
scrape_configs:
  # ==================== Java业务服务 ====================
  - job_name: 'rag-wiki-gateway'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['rag-wiki-gateway:8080']
        labels:
          service: 'gateway'
          team: 'backend'

  - job_name: 'rag-wiki-auth'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['rag-wiki-auth:8081']
        labels:
          service: 'auth'
          team: 'backend'

  - job_name: 'rag-wiki-document'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['rag-wiki-document:8082']
        labels:
          service: 'document'
          team: 'backend'

  # ==================== Python AI服务 ====================
  - job_name: 'rag-wiki-python'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets: ['rag-wiki-python:8000']
        labels:
          service: 'python-ai'
          team: 'ai'

  # ==================== 基础设施组件 ====================
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysqld-exporter:9104']
        labels:
          service: 'mysql'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'

  - job_name: 'milvus'
    static_configs:
      - targets: ['milvus-exporter:9091']
        labels:
          service: 'milvus'

  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['es-exporter:9114']
        labels:
          service: 'elasticsearch'

  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']
        labels:
          service: 'minio'

  # ==================== Node Exporter ====================
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node'

  # ==================== K8s监控（生产环境） ====================
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
