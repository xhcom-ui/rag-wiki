# 预发环境 Docker Compose 配置
# 用于测试验证、UAT验收、性能测试

version: '3.8'

services:
  # ==================== Java业务服务 ====================
  
  # 网关服务
  rag-wiki-gateway:
    build:
      context: ../rag-wiki-java/rag-wiki-gateway
      dockerfile: Dockerfile
    container_name: rag-wiki-gateway-staging
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - SPRING_CLOUD_NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - PYTHON_AI_SERVICE_URL=http://rag-wiki-python:8000
    depends_on:
      - nacos
      - mysql
      - redis
    networks:
      - rag-wiki-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # 用户权限服务
  rag-wiki-auth:
    build:
      context: ../rag-wiki-java/rag-wiki-auth
      dockerfile: Dockerfile
    container_name: rag-wiki-auth-staging
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - SPRING_CLOUD_NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      - nacos
      - mysql
    networks:
      - rag-wiki-network

  # 文档管理服务
  rag-wiki-document:
    build:
      context: ../rag-wiki-java/rag-wiki-document
      dockerfile: Dockerfile
    container_name: rag-wiki-document-staging
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - SPRING_CLOUD_NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - MINIO_ENDPOINT=http://minio:9000
    depends_on:
      - nacos
      - mysql
      - minio
    networks:
      - rag-wiki-network

  # 审计运营服务
  rag-wiki-audit:
    build:
      context: ../rag-wiki-java/rag-wiki-audit
      dockerfile: Dockerfile
    container_name: rag-wiki-audit-staging
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - SPRING_CLOUD_NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
    depends_on:
      - nacos
      - mysql
    networks:
      - rag-wiki-network

  # 定时任务服务
  rag-wiki-job:
    build:
      context: ../rag-wiki-java/rag-wiki-job
      dockerfile: Dockerfile
    container_name: rag-wiki-job-staging
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - MYSQL_HOST=mysql
      - XXL_JOB_ADMIN_ADDRESSES=http://xxl-job-admin:8080/xxl-job-admin
    depends_on:
      - mysql
      - xxl-job-admin
    networks:
      - rag-wiki-network

  # ==================== Python AI服务 ====================
  
  # Python AI服务
  rag-wiki-python:
    build:
      context: ../rag-wiki-python
      dockerfile: Dockerfile
    container_name: rag-wiki-python-staging
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=staging
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=http://minio:9000
      - LLM_API_BASE=http://llm-proxy:8001
    depends_on:
      - milvus
      - redis
      - minio
    networks:
      - rag-wiki-network
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

  # ==================== 中间件 ====================
  
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: rag-wiki-mysql-staging
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=RagWiki@2026
      - MYSQL_DATABASE=rag_wiki
      - MYSQL_USER=rag_wiki
      - MYSQL_PASSWORD=RagWiki@2026
    volumes:
      - mysql-data:/var/lib/mysql
      - ../rag-wiki-deploy/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=500
    networks:
      - rag-wiki-network
    deploy:
      resources:
        limits:
          memory: 2G

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: rag-wiki-redis-staging
    ports:
      - "6379:6379"
    command: redis-server --requirepass RagWiki@2026 --maxmemory 1gb
    volumes:
      - redis-data:/data
    networks:
      - rag-wiki-network

  # Milvus向量数据库
  milvus:
    image: milvusdb/milvus:v2.3.5
    container_name: rag-wiki-milvus-staging
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      - ETCD_USE_EMBED=true
      - ETCD_DATA_DIR=/var/lib/milvus/etcd
    volumes:
      - milvus-data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    networks:
      - rag-wiki-network
    deploy:
      resources:
        limits:
          memory: 4G

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    container_name: rag-wiki-minio-staging
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - rag-wiki-network

  # Nacos配置中心
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: rag-wiki-nacos-staging
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_DB_NAME=nacos_config
      - MYSQL_SERVICE_USER=rag_wiki
      - MYSQL_SERVICE_PASSWORD=RagWiki@2026
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      - rag-wiki-network

  # XXL-JOB调度中心
  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.0
    container_name: rag-wiki-xxl-job-staging
    ports:
      - "8081:8080"
    environment:
      - PARAMS=--spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=rag_wiki
        --spring.datasource.password=RagWiki@2026
    networks:
      - rag-wiki-network

  # ==================== 监控组件 ====================
  
  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: rag-wiki-prometheus-staging
    ports:
      - "9090:9090"
    volumes:
      - ../rag-wiki-deploy/monitoring/prometheus/staging.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - rag-wiki-network

  # Grafana可视化
  grafana:
    image: grafana/grafana:latest
    container_name: rag-wiki-grafana-staging
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ../rag-wiki-deploy/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - rag-wiki-network

  # ELK日志收集
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: rag-wiki-es-staging
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - rag-wiki-network

  kibana:
    image: kibana:8.11.0
    container_name: rag-wiki-kibana-staging
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - rag-wiki-network

networks:
  rag-wiki-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  milvus-data:
  minio-data:
  nacos-data:
  prometheus-data:
  grafana-data:
  es-data:
